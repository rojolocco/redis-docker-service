services:
  redis:
    image: redis:latest
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - caddy_network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    env_file:
      - .env.prod
    ports:
      - "8082:8081"
    networks:
      - caddy_network

volumes:
  redis-data:

networks:
  caddy_network: